services:
  db:
    image: mariadb:10.6
    container_name: itop-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE}
      MYSQL_USER: ${USER}
      MYSQL_PASSWORD: ${PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sso-network

  itop:
    build: .
    container_name: itop
    env_file:
      - .env
    restart: always
    depends_on:
      - db
    volumes:
      - ./itop:/var/www/html
    networks:
      - sso-network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      sso-network:
        aliases:
          - keycloak.local
          - itop.local

volumes:
  db_data:

networks:
  sso-network:
    external: true